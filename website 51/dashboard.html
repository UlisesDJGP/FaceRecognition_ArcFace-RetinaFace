<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Captura Biométrica - ASIST IA UT</title>
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:400,600" rel="stylesheet">
    <link rel="stylesheet" href="dist/css/style.css">
    <style>
        .camera-container {
            width: 100%;
            max-width: 600px;
            height: 450px;
            background: #000;
            border: 3px solid #333;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #video-feed {
            display: none;
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 300px;
            border: 2px dashed rgba(0, 191, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-upload {
            background-color: #00bfff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            transform: scale(1.05);
        }

        .status {
            margin-top: 15px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body class="is-boxed has-animations">
    <div class="body-wrap">
        <header class="site-header">
            <div class="container">
                <div class="site-header-inner">
                    <div class="brand header-brand">
                        <h1 class="m-0">
                            <a href="index.html">
                                <img class="header-logo-image" src="dist/images/logo.svg" alt="Logo">
                            </a>
                        </h1>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <section class="hero hero-dashboard">
                <div class="container">
                    <div class="hero-inner">
                        <div class="hero-copy" style="text-align: center; min-width: 100%;">
                            <h1 class="hero-title mt-0">Visión de Cámara</h1>
                            <p class="hero-paragraph">Posiciona tu rostro dentro del recuadro para el reconocimiento.</p>
                            
                            <div class="camera-area">
                                <div class="camera-container">
                                    <canvas id="video-canvas"></canvas>
                                    <video id="video-feed" autoplay muted playsinline></video>
                                    <div class="face-guide"></div>
                                </div>

                                <div class="btn-group">
                                    <button class="btn-upload" id="capture-btn">Capturar</button>
                                    <button class="btn-upload" style="background-color: transparent; border: 1px solid #333; color: #888;" onclick="window.history.back()">Regresar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="container">
                <div class="site-footer-inner">
                    <div class="footer-copyright">&copy; 2026 ASIST IA UT. Panel de Estudiante.</div>
                </div>
            </div>
        </footer>
    </div>

    <script src="dist/js/main.min.js"></script>
    <script>
        let canvas, ctx, video, captureBtn;
        let stream = null, cameraReady = false;

        function iniciarCamara() {
            canvas = document.getElementById('video-canvas');
            video = document.getElementById('video-feed');
            captureBtn = document.getElementById('capture-btn');

            if (!canvas || !video) {
                console.error("❌ Canvas o Video no encontrados");
                return;
            }

            configurarCanvas();

            navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
                audio: false
            })
            .then(s => {
                stream = s;
                video.srcObject = stream;
                video.play().catch(e => console.error("Error play:", e));
                video.onloadedmetadata = () => {
                    console.log("✓ Cámara iniciada");
                    cameraReady = true;
                    dibujar();
                };
            })
            .catch(err => {
                console.error("❌ Error cámara:", err);
                ctx.fillStyle = '#ff4b2b';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('Error: ' + err.message, 20, canvas.height / 2);
            });

            captureBtn.addEventListener('click', () => {
                if (!cameraReady) {
                    alert('Espera a que la cámara se cargue');
                    return;
                }
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'captura-' + Date.now() + '.png';
                    a.click();
                    URL.revokeObjectURL(url);
                });
            });

            window.addEventListener('resize', configurarCanvas);
        }

        function configurarCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx = canvas.getContext('2d');
        }

        function dibujar() {
            requestAnimationFrame(dibujar);
            
            if (!video || !canvas || !ctx) return;

            try {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (video.readyState === video.HAVE_ENOUGH_DATA || video.readyState === video.HAVE_CURRENT_DATA) {
                    ctx.save();
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                    ctx.restore();
                }
            } catch (e) {
                console.error("Error dibujando:", e);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarCamara);
        } else {
            iniciarCamara();
        }
    </script>
</body>
</html>
